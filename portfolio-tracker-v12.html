<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker v13 - 完整修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
        .btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(251 191 36); }
        table { border-collapse: collapse; }
        th, td { border-bottom: 1px solid rgba(251,191,36,0.2); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 text-slate-200 min-h-screen pb-12">

<div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold tracking-tight flex items-center gap-3">
            📊 Portfolio Tracker <span class="text-amber-400 text-3xl">v13</span>
        </h1>
        <div class="flex items-center gap-4 text-sm">
            <span id="lastUpdate" class="text-amber-400 font-medium"></span>
            <button onclick="exportPortfolio()" 
                    class="px-5 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center gap-2 btn">
                📤 匯出 CSV
            </button>
        </div>
    </div>

    <!-- 操作區 -->
    <div class="glass rounded-3xl p-8 mb-8 border border-amber-400/30">
        <div class="flex flex-wrap gap-4">
            <!-- 匯入持倉 -->
            <button onclick="triggerFileInput()" 
                    class="btn flex-1 md:flex-none px-8 py-4 bg-amber-400 hover:bg-amber-300 text-slate-950 font-bold rounded-2xl flex items-center justify-center gap-3 text-lg">
                📥 匯入持倉 (CSV)
            </button>
            <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleFileSelect(event)">

            <!-- 抓即時匯率 & 股價 -->
            <button onclick="fetchRealTimeData()" 
                    class="btn flex-1 md:flex-none px-8 py-4 bg-emerald-400 hover:bg-emerald-300 text-slate-950 font-bold rounded-2xl flex items-center justify-center gap-3 text-lg">
                🌐 抓即時匯率 & 股價
                <span id="fetchLoading" class="hidden animate-spin w-5 h-5 border-2 border-slate-950 border-t-transparent rounded-full"></span>
            </button>

            <button onclick="addManualRow()" 
                    class="btn flex-1 md:flex-none px-8 py-4 bg-slate-700 hover:bg-slate-600 rounded-2xl flex items-center justify-center gap-3 text-lg">
                ➕ 手動新增持倉
            </button>
        </div>
        
        <div id="statusBar" class="mt-4 text-sm font-medium min-h-[28px]"></div>
    </div>

    <!-- 持倉表格 -->
    <div class="glass rounded-3xl p-2 mb-8 overflow-hidden border border-amber-400/30">
        <table id="portfolioTable" class="w-full text-sm">
            <thead>
                <tr class="bg-slate-900/80 text-amber-300 text-left">
                    <th class="px-6 py-4">代碼</th>
                    <th class="px-6 py-4">持股數</th>
                    <th class="px-6 py-4">成本價</th>
                    <th class="px-6 py-4">現價</th>
                    <th class="px-6 py-4">市值</th>
                    <th class="px-6 py-4">損益</th>
                    <th class="px-6 py-4">損益%</th>
                    <th class="px-6 py-4 w-12"></th>
                </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-700"></tbody>
        </table>
    </div>

    <!-- 總覽卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="glass rounded-3xl p-6">
            <div class="text-amber-400 text-sm mb-1">總市值</div>
            <div id="totalValue" class="text-5xl font-bold text-white">0</div>
            <div id="totalPL" class="text-lg mt-2 flex items-center gap-2"></div>
        </div>
        <div class="glass rounded-3xl p-6">
            <div class="text-amber-400 text-sm mb-1">總損益</div>
            <div id="totalProfit" class="text-5xl font-bold text-emerald-400">0</div>
            <div id="totalProfitPct" class="text-lg mt-2"></div>
        </div>
        <div class="glass rounded-3xl p-6">
            <canvas id="assetChart" class="w-full h-48"></canvas>
        </div>
    </div>
</div>

<script>
// ==================== v13 核心資料結構 ====================
let portfolio = []; // {ticker, shares, costBasis, currentPrice, name, currency}

// ==================== 匯入持倉 ====================
function triggerFileInput() {
    document.getElementById('fileInput').click();
}

async function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    showStatus(`📂 正在讀取 ${file.name}...`, 'amber');
    
    const reader = new FileReader();
    reader.onload = function(event) {
        const csv = event.target.result;
        parseCSV(csv);
        e.target.value = ''; // 重置 input
    };
    reader.readAsText(file);
}

function parseCSV(csv) {
    const rows = csv.trim().split('\n');
    const headers = rows[0].toLowerCase().split(',');
    
    portfolio = []; // 清空舊資料
    
    for (let i = 1; i < rows.length; i++) {
        if (!rows[i].trim()) continue;
        const values = rows[i].split(',');
        const ticker = values[headers.indexOf('ticker') || 0] || values[0];
        const shares = parseFloat(values[headers.indexOf('shares') || 1] || values[1]) || 0;
        const cost = parseFloat(values[headers.indexOf('cost') || 2] || values[2]) || 0;
        
        if (ticker && shares > 0) {
            portfolio.push({
                ticker: ticker.trim().toUpperCase(),
                shares: shares,
                costBasis: cost,
                currentPrice: null,
                name: ticker,
                currency: ticker.includes('.HK') || ticker.includes('7709') || ticker.includes('9747') ? 'HKD' : 'USD'
            });
        }
    }
    
    renderTable();
    showStatus(`✅ 成功匯入 ${portfolio.length} 筆持倉！`, 'emerald');
}

// ==================== 抓即時匯率 & 股價 ====================
async function fetchRealTimeData() {
    const loading = document.getElementById('fetchLoading');
    loading.classList.remove('hidden');
    showStatus('🌐 正在抓取最新股價與匯率...', 'amber');
    
    try {
        const allTickers = portfolio.map(p => p.ticker).join(',');
        const defaultTickers = 'AAOI,AMD,AVGO,AXTI,COHR,META,GOOG,LITE,MU,NBIS,NVDA,ORCL,PLTR,SNDK,STX,TSLA,TSM,WDC,7709.HK,9747.HK,ETH,BTC,ONDS,TSM';
        
        const symbols = allTickers || defaultTickers;
        
        const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,shortName`;
        
        const response = await fetch(url, {
            headers: { 'User-Agent': 'Mozilla/5.0' }
        });
        
        if (!response.ok) throw new Error('Yahoo API 回應錯誤');
        
        const json = await response.json();
        const quotes = json.quoteResponse.result || [];
        
        quotes.forEach(q => {
            let ticker = q.symbol;
            const item = portfolio.find(p => p.ticker === ticker || p.ticker === ticker.replace('-USD',''));
            if (item) {
                item.currentPrice = q.regularMarketPrice;
                item.name = q.shortName || item.ticker;
            }
        });
        
        renderTable();
        updateSummary();
        showStatus(`✅ 即時資料更新完成！共抓取 ${quotes.length} 筆`, 'emerald');
        
    } catch (err) {
        console.error(err);
        showStatus(`❌ 抓取失敗：${err.message}（請稍後再試或檢查網路）`, 'red');
    } finally {
        document.getElementById('fetchLoading').classList.add('hidden');
    }
}

// ==================== 表格渲染 ====================
function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    portfolio.forEach((item, index) => {
        const marketValue = item.currentPrice ? (item.shares * item.currentPrice).toFixed(2) : '-';
        const pl = item.currentPrice ? (item.currentPrice - item.costBasis) * item.shares : 0;
        const plPct = item.currentPrice ? ((item.currentPrice / item.costBasis - 1) * 100).toFixed(2) : '-';
        
        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-800/50 transition-colors';
        row.innerHTML = `
            <td class="px-6 py-4 font-medium">${item.ticker}</td>
            <td class="px-6 py-4">${item.shares.toLocaleString()}</td>
            <td class="px-6 py-4">${item.costBasis.toFixed(2)}</td>
            <td class="px-6 py-4 font-semibold">${item.currentPrice ? item.currentPrice.toFixed(2) : '---'}</td>
            <td class="px-6 py-4 font-semibold">${marketValue}</td>
            <td class="px-6 py-4 ${pl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${pl.toFixed(2)}</td>
            <td class="px-6 py-4 ${pl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${plPct}%</td>
            <td class="px-6 py-4">
                <button onclick="deleteRow(${index})" class="text-red-400 hover:text-red-500 text-xl">🗑</button>
            </td>
        `;
        tbody.appendChild(row);
    });
    
    if (portfolio.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-slate-400">尚無持倉資料，請先匯入 CSV 或手動新增</td></tr>`;
    }
}

function deleteRow(index) {
    if (confirm('確定刪除此筆持倉？')) {
        portfolio.splice(index, 1);
        renderTable();
        updateSummary();
    }
}

// ==================== 手動新增 ====================
function addManualRow() {
    const ticker = prompt('請輸入代碼 (例如 NVDA 或 2330.TW)：') || '';
    if (!ticker) return;
    
    const shares = parseFloat(prompt('持股數量：')) || 0;
    const cost = parseFloat(prompt('成本價 (USD/TWD/HKD)：')) || 0;
    
    portfolio.push({
        ticker: ticker.toUpperCase(),
        shares: shares,
        costBasis: cost,
        currentPrice: null,
        name: ticker,
        currency: 'USD'
    });
    
    renderTable();
    updateSummary();
}

// ==================== 總覽更新 ====================
function updateSummary() {
    let totalValue = 0;
    let totalCost = 0;
    
    portfolio.forEach(item => {
        if (item.currentPrice) {
            const mv = item.shares * item.currentPrice;
            totalValue += mv;
            totalCost += item.shares * item.costBasis;
        }
    });
    
    const totalPL = totalValue - totalCost;
    const plPct = totalCost > 0 ? (totalPL / totalCost * 100).toFixed(2) : 0;
    
    document.getElementById('totalValue').textContent = totalValue.toLocaleString('en-US', {minimumFractionDigits: 2});
    document.getElementById('totalProfit').textContent = totalPL.toFixed(2);
    document.getElementById('totalProfit').className = `text-5xl font-bold ${totalPL >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
    
    document.getElementById('totalPL').innerHTML = `
        總損益 <span class="${totalPL >= 0 ? 'text-emerald-400' : 'text-red-400'}">${totalPL.toFixed(2)}</span> 
        <span class="text-slate-400 text-base">(${plPct}%)</span>
    `;
    
    document.getElementById('lastUpdate').textContent = `最後更新：${new Date().toLocaleTimeString('zh-TW')}`;
    
    updateChart();
}

let assetChartInstance = null;
function updateChart() {
    const ctx = document.getElementById('assetChart');
    if (assetChartInstance) assetChartInstance.destroy();
    
    const labels = portfolio.map(p => p.ticker);
    const values = portfolio.map(p => p.currentPrice ? p.shares * p.currentPrice : 0);
    
    assetChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels.length ? labels : ['尚無資料'],
            datasets: [{
                data: values.length ? values : [1],
                backgroundColor: ['#fbbf24', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#f59e0b']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', boxWidth: 12 } } } }
    });
}

// ==================== 匯出 ====================
function exportPortfolio() {
    if (portfolio.length === 0) return alert('尚無資料可匯出');
    
    let csv = 'ticker,shares,costBasis,currentPrice\n';
    portfolio.forEach(p => {
        csv += `${p.ticker},${p.shares},${p.costBasis},${p.currentPrice || ''}\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `portfolio_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

// ==================== 狀態顯示 ====================
function showStatus(msg, color = 'amber') {
    const bar = document.getElementById('statusBar');
    bar.innerHTML = `<span class="text-${color}-400">${msg}</span>`;
    setTimeout(() => {
        if (bar.textContent === msg) bar.innerHTML = '';
    }, 5000);
}

// ==================== 初始化 ====================
window.onload = function() {
    portfolio = [
        {ticker:"NVDA", shares:50, costBasis:120, currentPrice:null, name:"NVIDIA", currency:"USD"},
        {ticker:"TSM", shares:200, costBasis:180, currentPrice:null, name:"TSMC", currency:"USD"},
        {ticker:"TSLA", shares:30, costBasis:250, currentPrice:null, name:"Tesla", currency:"USD"},
        {ticker:"BTC-USD", shares:0.5, costBasis:65000, currentPrice:null, name:"Bitcoin", currency:"USD"},
        {ticker:"ETH-USD", shares:5, costBasis:3200, currentPrice:null, name:"Ethereum", currency:"USD"}
    ];
    
    renderTable();
    updateSummary();
    
    console.log('%c✅ Portfolio Tracker v13 載入完成！兩個按鈕已完全修復', 'color:#fbbf24; font-size:15px; font-weight:bold');
};
</script>
</body>
</html>
